name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate package
        run: yarn check

      - name: Set version from tag
        id: pkg
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$TAG_VERSION"
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.npm_check.outputs.published != 'true'
        run: npm publish --provenance --access public

      - name: Report already-published version
        if: steps.npm_check.outputs.published == 'true'
        run: echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published on npm"
